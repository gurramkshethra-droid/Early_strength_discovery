<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Career Guidance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <nav>
      <div class="brand">Career Guidance</div>
      <div class="nav-links">
        <a href="/login">Login</a>
        <a href="/register">Register</a>
      </div>
    </nav>

    <div class="page-wrapper">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash-message {% if category == 'success' %}flash-success{% else %}flash-error{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <section class="card form-panel auth-panel">
        <div class="form-header">
          <div>
            <p class="panel-label">Welcome back</p>
            <h2>Login to continue</h2>
          </div>
          <span class="badge badge-secondary">Secure Access</span>
        </div>
        <form method="post" action="/login">
          <label for="username_or_email">Username or Email</label>
          <input id="username_or_email" name="username_or_email" type="text" required>

          <label for="password">Password</label>
          <input id="password" name="password" type="password" required>

          <button class="primary-btn" type="submit">Login</button>
        </form>
        <div class="auth-links">
          <a href="/register">New user? Create an account</a>
        </div>
      </section>
    </div>
  </body>
</html>
