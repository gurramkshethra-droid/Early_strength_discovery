<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | Career Guidance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <nav>
      <div class="brand">Career Guidance</div>
      <div class="nav-links">
        <a href="/login">Login</a>
        <a href="/register">Register</a>
      </div>
    </nav>

    <div class="page-wrapper">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash-message {% if category == 'success' %}flash-success{% else %}flash-error{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <section class="card form-panel auth-panel">
        <div class="form-header">
          <div>
            <p class="panel-label">Get started</p>
            <h2>Create your account</h2>
          </div>
          <span class="badge badge-secondary">New User</span>
        </div>
        <form method="post" action="/register">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required>

          <label for="password">Password</label>
          <input id="password" name="password" type="password" required>

          <label for="confirm_password">Confirm Password</label>
          <input id="confirm_password" name="confirm_password" type="password" required>

          <button class="primary-btn" type="submit">Register</button>
        </form>
        <div class="auth-links">
          <a href="/login">Already have an account? Login</a>
        </div>
      </section>
    </div>
  </body>
</html>
